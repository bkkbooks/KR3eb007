front:
  text: 序醫有四科曰脈曰證曰藥曰方知脈而後知證知藥而後能方故脈尤汲汲也拙著脈義簡摩脈簡補義診家直訣辨脈平脈章句凡四種都十二卷博採百家參以己説名雖四種義實相承卷帙既繁脈絡難貫專取一種又苦弗完茲特撮其要者簡之又簡別為此編名曰重訂診家直訣
