body:
  text: 卷下獨取寸口本義附人迎氣口本義難經首章汲汲發明獨取寸口之義者以其法奇而旨奧也寸口賅寸關尺三部言其義本於內經經脈別論第別論之義注重在得氣之平以此脈發源心肺直達寸口自首至尾脈管之體無曲屈無大小噓發之氣適得其勻故曰氣歸於權衡而又得程途遠近之適中故曰權衡以平也難經之義注重在得氣之全以此脈發源心肺直達寸口心為百脈之根源肺為宗氣之橐龠故曰脈之大會自首至尾無中途歧出以分其氣無他脈來會以攙其氣完而不偏純而不雜故曰手太陰之所終始也他部動脈雖亦發源心肺而或已貫他臟他腑而來或已分他經他絡而去氣有偏至故弗取之分寸關尺者經臟居上其氣前至故診於關前經臟居下其氣後至故診於關後內經曰手經之道近其氣至也疾手足之經且然況部位之高下乎分左右者心居中而血發於左肝居右而氣噓於左肺葉右大脾即甜肉右端亦大故皆氣行於右也近日西人以此脈為心肺之專不能分診五臟六腑聖人正以此脈得心肺之全乃可遍診五臟六腑妙識精微下愚豈容輕議三關脈體通考世謂寸口正取無脈覆手取之而得者謂之反關脈近武進費伯雄又有斜飛脈之說張石頑曰脈之反關者皆由脈道阻礙故易位而見有一手反關者有兩手反關者有從關斜走至寸而反關者有反於內側近大陵而上者有六部如絲而陽谿列缺別有一脈大於正位者有諸部細小不振中有一粒如珠者所謂從關斜走至寸而反關者外斜脈也所謂反於內側近大陵而上者內斜脈也所謂陽谿列缺別有一脈大於正位者似反關而非反關也謂之臂外脈蓋諸處本有細絡與手太陰脈通而手太陰之正管實由寸部透於反背出於陽谿趨於合谷正管有阻其氣不能直達則散溢諸絡迂道而達非正管移於諸處也靈樞邪客曰手太陰之脈出於大指之端內屈循白肉際至本節之後太淵留以澹外屈上於本節下內屈與陰諸絡會於魚際數脈並注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內走肺此順行逆數之屈折也此言手太陰脈自大指外側內屈下魚抵太淵太淵者寸口去本節甚遠但正直本節之後耳復自太淵外屈上於本節下此即所謂外斜脈大指本節下合谷穴處也自合谷內屈會陰諸絡於魚際伏行壅骨之下壅骨大陵穴處也外屈出於寸口者自伏而出斜行與前抵太淵者會此即所謂內斜脈也此脈與外斜之脈出於合谷者雙歧如叉脈經云從寸口斜入上者名曰解脈王冰謂不合而歧出如繩之解股是也外斜脈常與三關平等而內斜脈常細曾見有人時而內斜脈盛時而外斜脈盛其外斜脈盛無苦而內斜脈盛即苦氣逆胸滿蓋嘗思之其外斜脈盛無苦者氣行之正經也內斜脈盛即有所苦者此與手心主相會之絡也絡不當盛必木火逆橫致壅遏肺氣不得暢耳又有三部別有一細脈自尺至寸與正脈並行者此細脈或與正脈平排並行指下如引二線也或行於正脈之上浮之只見細脈沉之始見正脈也或行於正脈之下按之隱隱有一細脈自動於正脈之內也此等最宜留心若正脈中自見細線挺然指下者為寒為痰為瘀為癥瘕若別具一脈動而流連則是稟賦然矣世謂雙弦脈指下如引二線者死未足為據蓋雖引二線而指下來往流連者乃是本象其挺然指下無來去者即不二線庸有濟乎張石頑曰反關脈較平人細小者為常較平人反大者絕少不可以為指下變異謂之怪脈也凡遇反關殊異常脈即須細詢其較之平時稍大即為邪盛較之平時愈小即為氣衰仍以所見諸證參之更有正取反取俱無脈細尋卻在手臂鼠肉之上者亦反關之類也但此脈已無常似難憑脈必須察其病證何如元氣何如以斷吉凶此論極為精當氣血形勢直解氣無形也血有形也氣動也血靜也脈之行也以息往來其動則氣也其管則血之質也病在氣分候動之勢病在血分候脈之形氣主煦之血主濡之血病即當累氣故候形者必兼審勢氣病久乃累血故察勢者不必泥形氣虛血實脈雖弱而按之必有形血衰氣盛脈雖空而其來必有勢是故凝痰瘀血無論脈勢強弱按之必有勁線或如珠粒氣化升降不利無論脈形虛實其動也必有疏密不勻強弱不均或寸弱於尺或尺弱於寸或應指少力或中道而還血實者脈形必厚血虛者脈形必薄牢實與芤革可推也氣盛者來勢必盛氣衰者來勢必衰濡弱與洪滑可例也氣周於外血貫於中故氣寒而血為所束脈即細緊血虛而氣無所歸脈即微散也氣鬱與血結必殊血虛與氣弱不類此分見者也血熱即見氣脈氣寒則見血脈此又互見者也且夫勢衰而形實者有氣虛不能運血有血滿致郁其氣何以辨之曰血累氣者氣不虛其勢雖來去不大而按之必有倔強欲起之情似動似滑所謂陰中伏陽也氣累血者血不行指下堅細而已勢盛而形虛者有氣亢以耗其血有氣旺將生其血何以辨之曰氣耗血者輕診必帶弦而來多去少氣生血者輕診必見濡而來去停勻也經曰脈澀而堅者血實氣虛也脈浮而大者氣實血虛也氣熱者血未嘗不奔逸然清其氣而血即平若正入血分則腫腐矣但清其氣無功也氣寒者血未嘗不凝滯然溫其氣而血即通若正入血分則頑塊矣但溫其氣無功也故吾嘗謂病之在經絡也有在氣分有在血分其在臟腑也止可以在氣分而不可以在血分前人每言病在某臟某腑血分者仍指其經絡言之也或指其血力氣累者也果在血分臟體壞而死矣左右表裡直解王海藏曰傷寒以左脈為表右為里雜病以右脈為表左為里予初診不盡驗心以為此特一法耳固不可拘也近二年來深察病情脈象有可得而言者凡外感風寒濕之邪深者皆系左脈沉細於右淺者但兩手浮弦或右關前浮弦而已外感暑熱之邪深者皆系左脈弱散於右淺者但兩手浮滑或右關前浮大而已溫病之由於伏氣內發者前人皆以右大於左為詞謂邪從中道胃氣鬱濁之故以吾歷診春溫冬溫喉痧疫疹諸症凡右大於左而左脈不甚細弱者真陰未損治之易愈若左脈沉細而數斷續不勻真陰已竭十難救一是當以左小於右定正氣之成敗不當專以右大於左定邪氣之微甚也又診夏行秋令時疫有所謂癟螺痧者其證先見頭痛心嘈四肢麻冷螺紋陷下或吐或瀉旋即昏厥重者即死輕者醒後越一二日而死醒後心中煩悶其苦難言而神識清明額汗不止其脈皆兩手沉細短伏關後而左手尤甚此天行肅殺之氣傷其心肝生陽之氣亦由其人生陽之本虛也又診水腫之人陰邪極盛亦莫不左脈沉小於右此外一切大病久病邪氣深入者莫非左陷於右元氣虧甚者亦莫非左弱於右其將愈也則又右脈先盛左脈後復必待左脈復盛乃為元根充固其病可無慮反復矣病氣輕淺左脈決不受傷惟癥瘕積聚其病雖深必隨其經絡之部位而見於脈不能拘於此例耳由此觀之左里右表者百病之通診傷寒豈能獨異耶故吾以左脈察邪氣之淺深即以左脈察元氣之虛實其脈象須各因病而定不得專以大小二字賅之寒邪以細而急為甚熱邪以薄而散為甚陰虛以浮散而短為甚陽虛以沉細而短為甚其敗也總歸於躁疾散斷全無神力而已矣海藏之劈分傷寒雜病者彼蓋以雜病為勞倦內傷也由氣分漸傷入血分血傷而左脈敗矣故左為里也寒為陰邪先傷於陽內傳胃實而右脈大矣故右為里也殊不知陽明胃實證乃陽氣之內鬱而盛有撐邪外出之機不得謂之寒邪內陷寒邪內陷者少陰厥陰之寒證是也是仍當在左手矣大凡病之始生也屬陽虛與寒甚者左脈常沉小於右屬陰虛與熱甚者右脈常浮大於左若沉小之極而右脈亦陷則胃陽絕矣浮大之極而左脈亦散則腎氣絕矣故喉痧之死脈皆右關與左脈同其短數癟螺痧之治脈皆右關緩滑有力左脈雖伏而不至散斷者也左脈重尺右脈重關盛啟東以新病之死生主乎右手之關脈久病之死生主乎左手之關尺義正如此此皆取其偏重者言之也若夫邪氣之猝至雖兩手脈伏尚不為凶病久邪雜陰陽臟腑俱困者但一部脈壞即為不吉是又在於圓機應變者說神脈貴有神由來舊矣其說約有數端一曰應指有力也一曰來去從容也一曰來去如一也亦曰陰陽俱停陰陽同等一曰形體柔和也四者固俱本聖經而皆有似是而非之處不可以不辨所謂有力者謂其氣來應指之際充然有餘而無怯然不進之象若謂搏擊滑大失本意矣所謂從容者謂其來去中途和緩而無一擊即來一掣即去躁疾不安之象若怠緩之脈其氣來至中途而不欲前去至中途而即欲止豈從容之謂耶所謂如一者來能高滿於其分去能深極於其底而無來盛去衰與來不盛去反盛之嫌也若來如釜沸去如弦絕則非是矣形體柔和者真氣充於脈中而脈管之四傍又與肌肉相親也外緊內空內結外散均非是矣獨是四者之義乃指平脈之神非病脈之神也病者正氣若虛應指豈必有力況乎陽盛陰衰陰盛陽衰血虛氣實氣虛血實又豈能從容如一而柔和耶然則何以見其神也神妙萬物平脈之神尚難揣摩病脈之神孰能擬議神不可言言神所見之處可乎前人謂應指有力是脈既動之後也吾謂神不在既動之後而在方動之初其來也意似浩然湧出無力倦不能來與迫欲急來不安於內之情其去也意似坦然折入無怠不欲去與應指即散不見其去之象如此則應指即令少力即令不能從容如一而柔和而神自卓然在也來去二者之中又以去為尤要何者去乃真陰之內吸也若回折有勢如石投水是陰氣猶全元根未撼此察神於方動之頃也內經曰靜者為陰動者為陽所謂靜者脈氣方停未來未去之間也察其未來之先停於下者之久暫而知真陰之盈虧即可知真陽噓力之盛衰也察其既來之後停於上者之久暫而知真陽之衰旺即可知真陰吸力之強弱也此察神於未動之始也方來也方去也未來也未去也皆神所流露之處也聖經未嘗不明言之但後人讀書不能領會今略為拈出以俟來哲之發揮豈敢謂義盡於此耶至於神之發源生於胃氣本於命門前人論之夥矣不煩絮聒辨止凡癥瘕積聚痰凝水溢胕腫痞滿喘促咳逆畜血停食風熱癮疹寒濕筋骨疼痛心胃氣痛以及憂愁抑鬱大怒久思久坐夜深不寐與夫因病過服涼泄胃氣遏伏不通婦人月閉妊娠脈皆常有停止有停一二至者有停二三十至而復來者即仲景所謂厥脈也又小兒脈多雀鬥不勻此其多寡疏密舉不足為吉凶之據也詳考其辨蓋有四端一察其不停之至應指之有力無力起伏之有勢無勢也力與勢盛即為有神力與勢衰即為無神一察其停至之頃是在脈氣下伏之後其力不能外鼓而然者是為邪所遏陽不能噓若在脈氣上來之後其力不能內返因從指下即散如弦之絕而不見其下去者是元根已離陰不能吸其餘氣遊奕經絡之中而將外脫也一察其停至之至是於脈氣下伏之後全不能起徑少一至是邪氣內結也若非全不能起已至中途不能上挺指下喘喘然搖擺而去者是中氣內陷不振而將上脫也稍遲即當變見蝦游魚翔之象矣一察其既停之後復來之至將起未起之際有努力上掙艱澀難起之意者即知其停是邪氣所阻也若起伏自然如常流利略無努掙難澀之情是其停為元根已離其餘氣徘徊於三焦胸腹之空中進退無定而將上脫也稍遲即當變見雀啄屋漏之象矣更察其脈之形無論為緊斂為洪大但能通長勻厚應指有力高下停勻或來微衰而去盛者吉也若應指少力來盛去衰及寬大中挾一細線指下挺亙不移或上駛如馳如射又斷而累累如珠及指下如引數線不能斂聚者是中氣敗散為痰所隔而不合即所謂解索也故有偶停一二至而即決其必死者為其氣敗而不續也有久停二三十至而仍決其可治者為其氣閉而內伏也更察其證有病之人必痰塞氣逼不得宣暢神識昏迷譫妄躁擾狂越可駭者吉也若氣高不下時時眩冒及神識清明而靜者凶也無病之人必胸膈不清肋脹腹痛氣悶不舒心中驚惕寐中肢掣夜夢紛紜及見惡物入暗洞者吉也若四肢無力稍動即喘氣高不能吸納胸中時時如飢而又不欲食二便清利頻數者凶也初診久按不同出張石頑問脈有下指浮大按久索然者有下指濡軟按久搏指者有下指微弦按久和緩者何也答曰夫診客邪暴病應指浮象可證若切虛羸久病當以根氣為本如下指浮大按久索然者正氣大虛之象無問暴病久病雖證顯灼熱煩擾皆正衰不能自主隨虛陽發露於外也下指濡軟按久搏指者里病表和之象非臟氣受傷即堅積內伏不可以脈沉誤認為虛寒也下指微弦按久和緩者久病向安之象氣血雖殆而臟氣未敗也然多有變證多端而脈漸小弱指下微和似有可愈之機者此元氣與病氣俱脫反元病象發見乃脈不應病之候非小則病退之比大抵病人之脈初下指雖乏力或弦細不和按至十餘至漸和者必能收功若下指似和按久微澀不能應指或漸覺弦硬者必難取效設病雖牽纏而飲食漸進便溺自調又為胃氣漸復之兆經云安穀者昌又云漿粥入胃則虛者活此其候也單診總按不同脈有單診總按不同者或單診強總按弱也或單診弱總按強也或單診細總按大也或單診大總按細也凡單按弱總按強者此必其脈弦滑一指單按氣行自暢無所搏激三指總按則所按之部位大氣行不暢而搏激矣此脈本強而總按更強於單按也單按強總按弱者此必其脈氣本弱但食指較靈單按指下較顯名中二指較木總按即不顯其振指也此脈本弱而總按更弱於單按也單按細總按大者是其脈體弦細而兩旁有暈也總按指下部位大而暈亦鼓而應指矣單按大總按細者必其人血虛氣燥脈體細弱而兩旁之暈較盛也食指靈而暈能應指名中二指木而暈不能應指矣更有單按浮總按沉單按沉總按浮者其浮即暈也抑或脈體本弱輕按氣無所搏力不能鼓重按氣乃搏鼓也又有醫者操作用力指尖動脈盛大與所診之脈氣相擊而亦見盛大者又有醫者久行久立指頭氣滿皮膚膹起因與脈力相隔而不顯者此皆極瑣細之處前人所不屑言而所關正非淺鮮也大抵單診總按而指下顯判大小強弱之有餘不足者其有餘總屬假象在無病之人固為正氣衰微即有病之人亦正氣不能鼓載其邪使邪氣不能全露其形於指下而微露此幾希也當以正虛邪實例治之固不得重於用攻亦不得以為邪氣輕微專於用補也即如總按大單診細者其細多是指下梗梗如弦起伏不大其中氣之怯弱可知單診大總按細者其細多是指下駛疾累累似滑是氣力不足於上充而勉強上爭也其中氣之竭蹶更可知矣強弱亦如是也總是稟賦薄弱或勞倦內傷或久病氣血困備胸中窄狹動作乏力乃多見之是因虛生實清濁混處氣鬱不舒之象也脈有兩側脈要精微論曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中王冰云兩旁兩尺外側也李中梓曰內外二字諸家皆說兩側此必脈形扁闊或有兩條否則於義不通矣觀易卦六爻自下而上上三爻為外卦下三爻為內卦則上下之為內外不昭然乎故內者每部之後半部也外者每部之前半部也李氏之解經誠新穎矣然脈實有兩側診法非扁闊與兩條之謂也凡指平按脈上其形如此及側指於內側拍之而其形如彼及側指於外側拍之而其形又如彼矣此可以脈之緩急滑澀察病之虛實寒熱內側主裡外側主表祗可取以與正脈合參不能專恃此以決病亦不能如正脈之分二十八脈各有主病也每診正脈微弱側診弦而兼滑則知有痰飲矣其微弱乃氣虛又為痰飲所困耳又如外側見弦內側見滑便是表寒裡熱與浮弦沉滑同斷余仿此頃讀韓氏醫通有云左寸指法按如六菽之重在指頂為陰屬心在指節為陽屬小腸餘部仿此此即兩側診法也但不言側指內側指外而言指頂指節似從正面平按未免蹈李氏扁闊兩條之誚耳脈有頭本內經曰脈之動也陽氣前至陰氣後至辨脈曰脈來頭小本大者名曰覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿蓋脈之來也自筋骨之分而上於皮膚之際乍擊於指此陽氣之前至也謂之頭既應於指而脈尚未去橫度指下此陰氣之後至也謂之本有來之初勢有力而旋即衰弱不見脈氣之橫趨者此頭大本小也有來之初勢不甚有力而旋見脈氣湧湧續上者此頭小本大也脈如曰動前脈盛氣有餘動前脈衰氣不足應後脈盛血有餘應後脈衰血不足此正與頭本之義相發明故頭本者就脈來之際分前後以別陰陽氣血非謂來為頭去為本也舊說有指為寸尺指為浮沉者皆未合云脈有動搖此所謂動搖是脈之本象非如緊脈之因病而見也扁鵲曰少陽之脈動搖六分正月二月王太陽之脈動搖九分三月四月王陽明之脈動搖三分其至跳五月六月王少陰之脈動搖六分七月八月王太陰之脈動搖九分九月十月王厥陰之脈動搖三分十一月十二月王此動搖之本於自然者也夫常脈之動搖人人所共有亦人人所必有必有動搖而後見其氣來之盛也須於指下脈來應指初回之際細審之自見矣泰西有審脈表凡脈之起而將落未落旋轉之際必有振撼之跡此氣之噓力大盛與吸力兩相激盪之勢也若緊脈熱為寒束其動搖即在脈勢初起之始乃熱力與寒相搏脈形挺亙故動搖之勢益顯世遂以動搖事屬之緊矣更有濕熱痰盛氣鬱而搖者氣不暢也有腎熱內沸氣喘而搖者氣不靜也有命火脫泄氣怯而搖者氣已無根如人之力弱而舉重也脈有俯側平人之脈寸浮尺沉關脈在中診時食指略輕名指略重此常法也若所謂俯仰者或寸沉尺浮是前俯後仰也或寸更浮尺更沉是前仰後俯也此三部之俯仰也又有一部二部前後相為俯仰此皆常有之事脈經曰從少陰斜至太陽者陰維也尺沉寸浮動苦肌肉痹癢僵仆羊鳴手足相引甚者失音不能言從少陽斜至厥陰者陰維也尺浮寸沉動若癲癇肌肉淫痹汗出惡風此前後俯俯之專脈也二維有病即見其脈其實尋常診脈多用此法以審氣之升降強弱奚必二維哉又內經陰陽結斜多陰少陽其義亦可通此謂尺寸脈緊澀而傾斜前仰後俯浮少沉多所謂肝腎並沉為石水也扁鵲曰不俛不仰不低不昂此為平脈此俯仰二字所本也脈有內曲外曲脈要精微論曰推而外之內而不外有心腹積也推而內之外而不內身有熱也所謂外者脈外近臂前廉手陽明大腸脈之部也所謂內者脈內近大筋手厥陰心包脈之部也是脈形之弓曲或外羸或內朒也寒結之則脈形內曲熱鼓之則脈形外曲與小兒診三關脈紋內外之法其義同陰陽別論曰陰陽結斜多陰少陽曰石水少腹腫向來注者罔知斜曲之義夫結者堅而澀也斜者如弓之曲也多陰少陽者謂其斜之弓曲向內近於少陰而遠於陽明也石水少腹腫是為單腹脹即心腹寒積之類也張石頑診趙明遠曰左手三部弦大而堅從人迎斜內向寸是為三陽經滿溢入陽維之脈也當有顛仆不仁之虞所謂斜內向寸者必先外越乃折而內向上寸也三陽滿溢即內經身熱之類也脈經曰從尺邪入陽明者大風寒熱也大風厲風亦曰寒熱詳見風論邪入少陰者女子漏下赤白男子溺血陰痿不起引少腹疼是正氣虛則內曲邪氣實則外曲也扁鵲脈法曰外句者久癖也內卷者十日以還是又以內曲外曲分食積之新久也大抵脈之曲者皆因於積而又中氣虛也偏於熱多則外撐偏於寒多則內倚嘗診一婦病胃脘痛過服泄氣之劑右脈內倚藏於筋下左手弦勁問之曰左腹素有塊也用溫元補中二劑而脈復常脈有無數綱絲此痰脈也氣過指下似覺拖帶黏涎宛然中有無數細絲此心包絡與肺胃之有痰也必有嘈雜惱憹呼吸不利之證若平人常見此脈且兼洪弦又貪厚味多房室身肥項短時覺骨節不便胸膈不舒眼目少神夢寐不安久必有類中風證此脈形勢介在滑澀之間而實不可以滑澀名也痰多氣弱故其形似滑而其勢甚澀也王叔和以系水交馳為死脈真陽盡而脈中律液悉化為痰也系水者懸水多股即無數細絲其絲忽斷忽續而不聚故遂主死矣又有風馳脈其氣衝指而過如大風馳驟狀此血虛而痰火相搏也宜補血化痰主之脈有變易無定虛損久病脈象早晚不一時遲時數時大時小甚至起坐之間舉手換診亦有改變此由元氣不能自主或痰飲屍注所為易思蘭曰久病氣虛早晚脈同雖危可療韓飛霞曰重大之病一日三脈多變難治沉疴日日脈不移亦難治脈經曰左手寸口乍大乍小朝來浮大暮夜沉伏往來無常者榆葉枯落而死慎柔曰癆瘵脈酉戍時洪盛寅卯時細弱者陽氣虛陷也忌用苦寒當助陽以復其寅卯之位微加瀉陰火而已此皆虛勞鬼疰之類此外更見有兩種一種婦人初孕一二月內脈來忽大忽小忽如病危忽如無病其證亦時而逼急欲死時而舒暢如常也一種血虛內燥之體火灼於內濕閉於外陰陽升降失度腠理開合不時心常懊憹身常癮疹上下往來遊移無定其脈或寸大尺小或寸小尺大或左盛右弱或右盛左弱長短浮沉逐日變易連日診之無一同象凡遇此脈即宜細心察神審證或是燥火內燔或已屍氣內伏一當養陰宣陽一當理血殺蟲也大抵脈象無定在困病為陰陽之不交在平人為血氣之不和當求所以不交不和之故而治之脈有起伏中途變易舊說脈之浮沉不同者不過浮大沉小浮小沉大浮滑沉澀浮澀沉滑而已未有於起伏之間察其中途變易者也近來診視曾見有兩種脈一種其氣之初起自沉分而至於中也滑而踴躍有勢及至中分忽然衰弱無力緩緩而上至於浮形如泥漿其返也亦自浮緩緩而下於中由中至沉猾而有勢輕按重按指下總是如此其證身體困倦終日昏迷似寐非寐心中驚惕惡聞人聲目畏光明面帶微熱四肢微冷不飢不欲食但口渴索飲不止此衛濕營熱風燥在肺痰熱在胃也身中伏有濕邪而又吸受亢燥之新邪也以防風藁本通衛陽驅表濕紫苑白薇杏仁蔞皮宣泄肺中濁氣焦楂竹茹煅石膏煅瓦楞子降滌胃中熱痰兼以白芍清肝天竹黃清心而神清氣爽身健胃開矣一種脈氣正與此相反其初起自沉而中也艱澀少力由中而浮也躁疾如躍其返也亦由浮而疾下於中由中而沉遲弱無勢輕按重按指下總是如此其人嗜好洋菸飲食不強陰痿不起此表分無病而里有痰飲又上虛熱下虛寒也治當疏中溫下此二脈者皆古書所未言也豈真古人未見此脈哉見之而詞不能達徒以浮滑沉澀浮數沉遲了之不知浮沉之間遲數不能有二滑澀各自不同與此之起伏中變者迥別也故凡著醫案於脈證曲折處必不憚反復摩繪方能開發後學也外診撮要外診繁矣以面色目色舌苔三者為大綱茲撮其有關生死要診者著於篇欲睹其詳有拙著外診簡摩在目色主五臟面色主六腑舌苔主辨表裡寒熱血氣存亡者也前人分氣與色為二又分光與色為二其說甚精具在外診簡摩中靈樞五色篇論面色有所起所向凡色起處必緊而深厚所向處必漸淺而銳故曰上銳首空上向下銳下向察其起於何部便知病起何臟所向何部便知病入何臟以此參考病證決其吉凶凡察面色以初見而乍視之為準又須兼正面側面並看之須知粗老與枯燥不同明潤與浮焰不同大抵面色不怕濃濁而怕夭薄不怕滿面而怕一線凡察面色以初起如粟如珠如絲者為真又須察其色深連肉裡若滿面滯晦者氣也光也雖甚枯暗常主病而不主死以其肉裡色猶潤焉脈有真臟色亦有真臟凡黃色深重如土堆於皮面或繞眉目或繞顴鼻或繞唇口皆大凶鬢前兩太陽下及耳前為福德部忽滯晦者將病也常滯晦者腎與膀胱陽氣不足也又主身世偃蹇忽明而浮焰者凶也漸明者久病將愈也常明者主康強安樂常赤者主有血分燥熱病又主勞碌風波又兩鬢勻圓性情寬厚有福細長下垂多機心也面色以天中為主赤色黑色為最忌若見如粟如豆即凶他部有色應之其禍更速孕婦赤色主產厄平人男婦並主兵厄火厄面目色宜相生忌相剋病人面色生目色其愈速目色生面色其愈遲目色克面色其死遲面色克目色其死速凡病日加劇而面色愈見光焰目光愈似有神勝於平日者凶面色散漫主病而已若入竅為入門戶井灶主凶千金方言之甚詳入竅者即入眉目鼻孔口吻也凡面色兩部色並起漸見相連者凶凡久患濕痰困重人脾濕肝鬱山根下多見一橫道滯暗若內含微赤者伏熱也色雖深重不死旁連目胞下及兩顴即凶凡繞鼻準兩迎香紫黯而鼻準兩顴與唇俱光浮似腫者下體有楊梅瘡也不治凡面色起於內部而外行者內部漸開主病散故滿面色雖惡而印堂山根鼻準明潤深厚者雖困無危起於外部而內行者主病深為凶自下上行過顴自上下行過目皆凶又內經謂男子左為逆右為從女子右為逆左為從凡察目舊以四白為忌其實不然久病胞肉消瘦能無露白乎當以黑睛為主瞳人緊斂邊際分明神光內涵者壽相也雖困無危瞳人暴大及縮小邊際散漫神光昏濁皆忌小兒初生瞳人寬大者夭白睛黃者濕熱也青睛黃者濕熱甚也亦主血虛黑睛黃者腎虛也黃甚者皆為疸瘰癧癰疽有赤脈貫瞳子不治平人白睛常多赤脈者主有大風波天中及兩眉兩顴有赤色應之即發凡察舌須分舌苔舌質舌苔雖惡舌質如常胃氣濁惡而已苔從舌里生出刮之不能全淨者氣血尚能交紐為有根也凡舌苔以勻薄有根為吉白而厚者濕中有熱也忽厚忽薄者在輕病為肺氣有權在困病為腎氣將熄邊厚中薄或中道無苔者陰虛血虛也中道一線深陷極窄如隙者胃痿也舌根高起累累如豆中路人字紋深廣者胃有積也舌上星點赤而鼓起者胃熱也在兩旁主肝熱在尖主心熱淡而陷下者胃虛也在小兒為有滯有蟲望似有苔一刮即淨全無苔跡者血虛也一片厚苔或黃或白如濕粉所塗兩邊不能漸勻漸薄者胃絕也黑苔者血瘀也灰苔者血瘀而挾痰水也婦人傷寒時病最易生黑苔不得遽以為凶舊法黑苔以芒刺燥烈濕潤細膩分寒熱歷診瘀血苔黑雖內熱而不遽起刺有煙癮人苔易燥刺而非必內有真熱不過肺胃律傷耳凡見灰黑二苔總宜兼用行血其證寒熱甚者必神昏譫語無寒熱者必胸肋有一塊結熱內煩而夜不安眠也若僵縮言語不利或身重不能轉側及一邊不能眠乃凶舌枯晦而起刺者血燥熱極也雖結黑殼猶有生者光平如鏡乃凶亦有平人胃中夙有冷痰瘀血舌上常見一塊光平如鏡臨診宜詳問之又凡有痞積及心胃氣疼者病時舌苔多見怪異婦科尤甚凡久病齒光無垢者凶齒枯黃似垢非垢或雖有垢而一刷即淨而全無者皆腎氣將絕也唇青黯淡無華也人中滿寬縱不能起稜也唇吻反兩吻下垂如弓反也凡察耳宜與面目同色若不同者視其好惡辨其生克以決之耳輪忽枯如塵垢者凶也平人面色蒼潤而耳輪常焦黑而不枯者反為腎氣充實之相凡身瘦肉削而筋與骨緊附皮與肉緊著者及皮膚雖枯燥白屑而未跌結起粟者無慮也若筋骨相離皮肉相離寬縱如頹囊者皮上如麻豆累手身雖熱無汗但背心心窩額上准上有汗者手掌食指大指後露骨者目胞四圍深隱如削者項後大筋正中深陷如坑者並大忌之大筋兩旁陷者常也正中不陷無妨蓋肌肉脂膏消瘦可也筋絡腠理枯縮廢弛不可也形養於血色生於血病重血濁病久血虛形色相應常也血亂血散血枯血死形色不相應非常之變也跋醫學之有叢書莫著於吳勉學之古今醫統而近則東垣十書當歸草堂醫學叢書醫林指月諸刻不一而足古人苦心良法得以類聚而不朽洵醫林之盛業也獨是校讎不精則一字之訛害深白刃如吾初校脈經第四卷診損至脈篇脈再動為一至再誤為一則於黃帝扁鵲論脈諸語有難通者矣故素問玉機真臟論一息五六至者死林億不知轉以為誤文也一動一至者蓋始於難經也又如第三卷腎部篇中引靈樞邪氣臟腑病形腎脈微緩為洞洞者食不化入咽還出洞下增下字中藏經甲乙經亦增泄字夫洞即靈樞根結篇所謂膈洞專為食入復出證名與洞下何與耶徐靈胎蘭臺軌範有膈洞條即引根結篇及此文也又如脈訣刊誤戴同甫極詆靈樞衛氣行篇水下一刻人氣在太陽二刻在少陽三刻在陽明四刻在陰分之語以為衍文不知此必當時別法有以晝夜為二百刻者衛氣二刻一度百刻五十度此易曉也而細析其行陰行陽之數則又以別法之二百刻者四分之尤易曉也太陽少陽陽明陰分云者非十二經之三陰三陽也蓋人身最外一層即為太陽次為少陽再次為陽明里膜近臟腑者為陰分戴氏謂二刻一度當是一刻在三陽二刻在三陰豈知衛氣本不循經即營氣之循經者亦是陰陽互注無截然先行三陽後行三陰之事也此皆醫學之大者也豈可悖謬至此蓋凡取此書之善本以校此書其脫誤常不可見合眾書之善本以校一書其是否猶未可決必博覽深思心通其意庶灼然有以見其得失而釐正之然而舊本如是則例又不得而擅改甚矣校讎匪易也又如難經八難寸口脈平而死徐氏詆之謂如是則寸口何以決五臟六腑死生吉凶哉不知此正推進一義以見診脈貴察其神勿泥形也平者非真平也但不見死法耳其形雖平其神必敗十八難曰內有積聚脈不結伏外有痼疾脈不浮結脈不應病是為死病也張石頑曰常有變證多端而脈見小弱指下微和似有可愈之機此元氣與病氣俱脫反無病象發見此脈不應病法在不救慎柔和尚曰凡久病人脈大小洪細浮沉弦滑或尺浮寸沉或寸浮尺沉但有病脈反屬可治如久病浮中沉俱和緩體倦者決死此皆與經旨相發也又六十六難曰臍下腎間動氣者人之生命也八難亦同此說是越人明明以兩腎中間為命門矣復以右腎為命門者指命門真陽發動之機始於右腎以明診於右尺之故也後世執右腎命門之語以詆越人豈未見腎間動氣云云耶好名好勝之私填滿胸中務以新奇動人耳目遂有不暇求詳者也是刻也校萊雖反復數次而疏漏仍多論辨雖薈萃眾長而發明終少但當古籍淪湮之際使古人一線靈光得以稍延而不至遽沒亦幸矣周學海記
