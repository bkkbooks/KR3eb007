body:
  text: 卷上指法總義診脈之指法見於經論者曰舉曰按曰尋曰推曰初持曰久按曰單持曰總按無求子消息七法曰上竟下竟曰內推外推曰浮按中按沉按更有側指法挽指法輾轉指法俯仰指法舉而覆按按而復舉是操縱指法若是者皆有舊論可考也至於私心所創穫與得諸益友所訓示者則又有移指法直壓指法夫脈有四科位數形勢而已位者浮沉尺寸也數者遲數促結也形者長短廣狹厚薄粗細剛柔猶算學家之有線面體也勢者斂舒伸縮進退起伏之有盛衰也勢因形顯斂舒成形於廣狹伸縮成形於長短進退成形於前後起伏成形於高下而盛衰則貫於諸勢之中以為之綱者也此所謂脈之四科也指法即由此而辨曰舉按以診高深也曰上下以診長短也曰尋推以診廣狹厚薄曲直也曰初持久按以診遲數滑澀止代也曰單持總按以診去來斷續也病者氣口處骨肉不平須用側指法病者不能平臂而側置須用挽指法俯仰者三指輕重相畸也輾轉者一指左右相傾也操縱者舉按迭用以察根氣之強弱難經所謂按之軟舉指來疾者此也惟三指總按橫度三關三指縫中各有其隙若三部脈形不同如寸澀尺滑前小後大即無由得其接續之真迹昔有同學示以移指法如先診三關再略退半部以食指加寸關之交中指加關尺之交終以有隙而其真不見後乃自創一指直壓之法以食指直壓三關而真象迸露矣小兒脈位狹小以食指橫度脈上而展轉以診之二十四象會通浮沉以診氣之升降也陽不能降則脈見於浮陰不能升則脈見於沉前人每以脈之在浮在沉與脈之能浮能沉相混能浮能沉乃高深之義也遲數以診氣之躁靜也躁有因熱有因燥靜有因寒有因虛而皆有因郁按內經手躁足靜與遲數不同手經之道近其氣至也迫足經之道遠其氣至也緩故有躁靜之殊也然先至者不能先去必待後至者去而始能與之俱去故無遲數之異也滑伯仁謂察脈須識上下去來至止至止即察躁靜之事也察其停於下者之久暫又察其鼓於上者之久暫而陰陽噓吸之躁靜瞭然矣強弱以診勢之盛衰也應指有力謂之強無力謂之弱前人每以脈形之軟硬與脈勢之盛衰相混內經凡言脈之大小多指動勢之盛衰也剛柔以診形之軟硬也形軟有因血虛有因濕熱形硬有因血實有因風寒此即內經之所謂緩急也滑澀以診形之枯潤也血有餘則脈滑血不足則脈澀然血由氣行故亦可徵氣之盛衰云氣血必有津以載之始能推行滑利故內經以滑為陰有餘澀為陽有餘陰即津液也斷續以診氣血之通塞盛衰也有形之斷續長短是也有動之斷續促結澀代是也此條專言動之斷續應指有力有神屬於通塞無力無神關於盛衰亦有無力而有神者微衰而兼塞也來去停勻五十不代謂之續參伍不調有來有去謂之斷其敗也蝦遊魚翔屋漏雀啄塞者血塞也衰者氣衰也敗者氣血俱敗也長短以診氣之郁暢也氣暢則雖弱而亦長氣鬱則雖強而亦短按氣有出入有升降出入橫也升降直也風寒外束氣出不利脈來弦緊痰飲中結氣升不利脈來厥厥如豆是長短皆有氣鬱也經曰長則氣治短則氣病亦言其大概而已高深以診氣之噓吸也此指來去之遠近所謂息之深深達之亹亹者氣之操縱也浮沉是陰陽噓吸之已然高深是陰陽噓吸之方然一言氣之所在一言氣之所至厚薄以診血之盈虛也以形體言非浮沉之謂也故有浮而厚有沉而薄浮中沉三候俱有按之不斷謂之厚僅在一候按之即斷謂之薄寬窄以診氣血之寒熱盈虛也氣熱則血漲氣寒則血消血實則氣充血虛則氣怯斂散以診氣之寒熱也以兩旁之邊際言非寬窄之謂也寬窄指脈體之大小斂散指脈邊之清濁故氣寒血盈寬而亦清氣熱血虛窄而亦濁亦非剛柔之謂也剛柔指脈體之硬軟斂散指脈邊之緊松故血虛氣寒軟而亦緊血實氣熱硬而亦鬆脈中有脊而兩邊渾渾不清也粗細以診氣血之寒熱盈虛也寬厚相搏謂之粗窄薄相搏謂之細會通者二十四象互相加乘以求合於古脈而診百病也如浮薄而硬革也浮薄而軟芤也浮厚而斂弦也浮薄而散微也長硬而斂緊也短軟而散濡也高而數促也深而遲伏也短而剛強動滑也斷而柔弱結代也長厚硬斂弦牢也長厚柔散洪緩也是故芤血虛也遲氣寒也伏氣閉也代散氣脫也濡弱虛微氣血俱虛也細緊氣血俱寒也革陰盛於上也牢陰盛於下也洪促氣熱於氣分也動滑氣熱於血分也浮數氣熱於氣分也沉遲氣寒於血分也弦革氣寒於氣分也緊結氣寒於血分也細血中氣寒也緩血中氣熱也長短同有氣鬱氣橫於氣分則長氣結於血分則短也滑澀同有血虛血實寒凝於血分則實而澀熱亢於氣分則虛而滑也而且寒極似熱熱極似寒實極似虛虛極似實如滑主痰也而痰亦見澀弦主肝也而肝亦見濡上氣喘促脈虛大也而亦有緊細伏匿孕脈必滑也而亦有虛澀不調又弦緩相反也而風弦與熱緩相似滑澀相反也而熱澀與虛滑相似搏與散相反也而搏而纍纍不續即與散同論洪與伏相反也而尸厥霍亂伏與洪同斷長與短相反也而長而徑短而搏同主氣逆氣鬱散與結相反也而同主癥瘕正氣未衰則結正氣既衰則散亦有乍病食滯而脈散乾胃氣新亂而未復也或其人素有濕熱加之新傷而中氣益潰也有以無脈為病所者芤脈中空即內主精血之傷也有以有脈為病所者緊脈浮數即外主風寒之感也抑尤有要焉滑伯仁曰察脈須識上下去來至止六字真訣故審脈者凝神於指下起伏去來頭本之勢而脈之真象無遁即病之升降斂散之真機亦迸露而無遁矣明乎此者必知脈證斷無相反何則有所以相反者在也脈病斷無不應何則有所以不應者在也仲景曰邪不空見中必有姦景嶽曰脈之假者人見之不真耳脈亦何從假哉八法總義靈樞邪氣臟腑病形篇以緩急大小滑澀立綱而以微甚緯之實開千古診法之奧後世有以浮沉遲數分綱者則其義淺而不備矣今擬合二者共十字仍以微甚緯之於十字中縱橫離合即二十八脈不待擬議而形狀瞭然然此特其形狀耳未足以盡脈理之妙也滑氏曰凡察脈須識得上下去來至止蓋求明脈理者須先將位數形勢講得真切便於百脈無所不賅不必立二十八脈之名可也位者浮沉前後也數者遲數也形者虛實滑澀也勢者即滑氏所謂上下去來至止也四者為經更緯之以微甚兼獨百病之虛實寒熱全從此八字上分合剖析每診一人即於各部中按此八字次第求之反復尋之則真假無遁情而氣分血分之病亦到指便見矣此真泄天地之祕者也指到脈上即心先擬其脈浮耶沉耶在寸在尺耶繼存其息遲耶數耶繼察其體長耶短耶虛耶實耶滑耶澀耶審此三者指下必已有定象即就定象上揣其微耶甚耶獨見一脈耶兼見何脈耶至此而象更定矣於是玩其上下起伏之盛衰動止之躁靜而本原無不迸露焉大抵診脈以察來去之勢為最要此陰陽噓吸之真機也位數形勢位數形勢者正脈之提綱也位即三部九候也或在寸或在尺或在浮或在沉數以紀其多寡也數與滑促其數皆多遲與澀結其數皆少即屋漏雀啄蝦遊魚翔舉該於數之類也至於形勢分見互見各有妙蘊挺亙於指下而靜乾者形也血之端倪也起伏於指下而動者勢也氣之徵兆也內經曰渾渾革革至如湧泉又曰脈至如火新然脈經曰三部脈如釜中湯沸此血不維氣勢之獨見者也內經曰真肝脈至如循刃刃責責然真心脈至如循薏苡子纍纍然此氣不運血形之獨見者也故形勢分見者皆氣血偏絶之死脈也若在平人無不氣血相融形勢相洽者然氣血稍病即於相融相洽之中不無彼此勝負之致尤不可以不辨如形徑於外者氣悍於中是動與大也氣不甚悍是弦與緊也若氣甚歉則為細矣為芤矣形微勝於氣者此也如形弱於外者氣悍於中是洪與滑也氣不甚悍是濡與弱也若氣甚歉則為散矣為微矣氣微勝於形者此也是故人之診脈也指到脈上先察其形之粗細硬軟再審其氣之至也充於脈管之中微溢脈管之外既將脈形撑寬而又起伏高深有力無來去盛衰之參錯斯為氣血和同焉何者脈之正管其四旁必有無數微絲細管以達其氣於肌肉所謂腠理也若寒盛而陽氣不敵則微絲細管先為寒束脈氣之來不能旁溢此即緊脈之象也更有脾肺中氣不足不能充於脈中往往脈形挺然指下而氣來如線從脈中馳過既不能撑寬更不能起伏矣此脈形雖粗脈氣自細也更有中焦痰飲停結其濕熱濁氣上蒸肺中肺氣不能清肅脈管為之膹莞其形挺然指下而中氣為痰飲格拒不能暢達其來如綿過於指下既不能撑寬亦不能起伏矣此脈形雖硬脈氣自軟也此非脈管自硬乃濁氣壅塞使然是動脈之中有推蕩不動之氣也李士材論芤脈有云其狀如按慈蔥以指浮候之著上面之蔥皮中候之正當蔥之中空處沉候之又著下面之蔥皮矣此非獨芤脈之診也脈管本自如此但有時緊時鬆時虛時實之異芤脈中虛遂易顯耳芤脈屬浮只動於上面之皮其下面之皮不動也此脈形雖厚脈氣自薄也勢有來去有起伏形有中邊有底面是故平人之身榮衛調和脈中脈外氣行度數相應指下每不見脈之硬管及氣之來乃覺正管既充而又微見旁溢焉且微絲管之所繫大矣倘衛陷入榮中外隔絶脈在指下一條扛起是壯火耗津孫絡不能濡潤而閉塞也往往有眩冒顛仆偏枯痿易之虞昔者俞春山嘗言老人虛人久病將死其脈皆獨然一條扛起似與肌肉不相連絡是氣血不交榮衛相離猶老樹將枯根上旁須先見憔悴不得土氣矣此察形之至微者也至於察脈之勢非但察其來去之盛衰也必且來去之間循環相續自沉從容上浮自浮從容下沉其情如環無驟折之迹嘗見有一種脈其來也有頃而一掣其去也有頃而一掣一息亦不過四五至未嘗數於常脈而指下鶻突無容與回環之度此為津虛血熱氣燥而旋轉不利也內經謂之躁脈故夏脈如鉤者以其來盛去衰不能如環之圓鉤即環之缺一面者也躁則來去如一並無所缺而驟來驟去不為圓轉而為直折蓋扁鵲所謂其至跳者內經又謂脈之動也陽氣前至陰氣後至是又於脈氣方動之頃分別前後以察陰陽之微機於是難經有前大後小頭痛目眩前小後大胸滿短氣之論仲景有脈來頭小本大其病在表之談後人有動前脈盛氣有餘脈衰氣不足應後脈盛血有餘脈衰血不足之辨是皆剖析微芒脈學之上乘診家之慧業也微甚兼獨微甚兼獨者變脈之提綱即體察形勢之權衡也凡物之輕重也非特極輕極重之並處也必有微輕微重者介乎其間故微甚不可不知也如難經所論一脈十變與靈樞之論緩急大小滑澀其義大矣第脈有以微見為善者有以甚見為善者固不盡微即皆輕甚即皆重也萬象之變化無定也形形色色舉在分分合合之中故有一象而兼數象者直須辨明主客知其孰為正象孰為兼象庶幾施治用藥之輕重乃有所準矣李東垣云脈之相合各有虛實不可只作一體視之假令弦洪相合弦主也洪客也子能令母實也洪弦相合洪主也弦客也母能令子虛也餘脈仿此可以類推夫所謂主客者臟腑之病氣皆各有主脈如肝臟與風氣之病其脈皆弦心臟與熱氣之病其脈皆洪若其間有挾痰挾食挾血挾虛之異即其脈之所見必有兼象所謂客也是故脈無單見古人立二十八脈亦不過懸擬其象以明大綱使學者有所據以為講明之地講明乎五臟六氣之主脈斯知臟脈之變有萬無非各主臟之脈所互乘也病脈之變有萬無非各主病之脈所互乘也倘執著而不知會通紙上之象幾無一合於指下之象指下之象更無一合於紙上之象矣開卷瞭然臨診茫然是何為者況微甚有因兼獨而分兼獨每因微甚而見故寬而兼厚以實兼實是甚實也薄而兼窄以虛兼虛是甚虛也厚而兼窄是微實也薄而兼寬是微虛也更有大謬之語難為外人道者厚而兼薄也寬而兼窄也粗而兼細也滑而兼澀也長而兼短也浮而兼沉也遲而兼數也於萬萬相反之事而忽並見於三指之下此又何説以處之曰此有一微一甚也此必一見於形一見於勢也亦有相間而迭呈者即難經所謂陽中伏陰陰中伏陽也故常有於綿軟之中忽夾一至挺亙指下如弦之象此有因氣逆上衝有因氣鬱猝發有因氣脫不返宜察其脈之神而決之此即來大時小來小時大之類也又常有於遲緩之中忽夾一至躁疾上馳如射此亦有鬱氣之猝發或伏熱之乍升宜察其脈之沉分而參之脈經曰尺脈上應寸時如馳半日死此又氣之脫也若沉分大而有神只是氣滯熱伏耳總之講脈學者先求脈在人身為何等物再將脈象之綱領條目從自心中一一為之分析不必倚傍舊説而自推見本原如位也數也形也勢也此綱領也位之在寸在尺在浮在沉也數之為遲為數為疏為密也形之長短廣狹厚薄粗細軟硬堅松也勢之強弱高深也此條目也於此各推求其所以然之故瞭然心中然後彼此參互如微甚兼獨之迭見者亦皆有以得其變化之本臨診自有條理不致眩惑大凡人之病也邪甚脈甚邪微脈微不待言矣而且兩邪合病則兩脈並見三邪合病則三脈並見如仲景論脈諸文所謂脈弦而大弦則為寒大則為虛脈浮而緊浮為衛氣實緊為榮中寒是皆分析各脈之主證而後合訂主病之正脈故學者總須先求其分再求其合分者苟能剖析微芒則其合者特分者為之參錯耳若起手不知探原拘泥文字逐末忘本即將脈名增為百數亦不足以盡天下之變矣恐終身無見真之日也
